# fly.toml app configuration file
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = 'customersupportagent-hedra-sabah'
primary_region = 'sin'

[build]

# LiveKit agent is a long-running worker process, not an HTTP service.
# No [http_service] — the agent connects outbound to LiveKit Cloud via WebSocket.

[processes]
  app = "python agent.py start"

[[vm]]
  memory = '2gb'
  cpu_kind = 'performance'
  cpus = 1
